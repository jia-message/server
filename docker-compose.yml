services:
  db:
    image: postgres:16-alpine
    container_name: jia-db
    environment:
      POSTGRES_DB: jia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d jia" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    container_name: jia-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9000"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jia-server
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      ENV: development
      JIA_MASTER_KEY: "super-secret-master-key-change-me"
      JWT_SECRET: "jwt-token-signing-secret-key-12345"
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: jia
      DB_SSLMODE: disable
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
  minio_data:
